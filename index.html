<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>This Day in Conspiracies — Connect the Files</title>
<meta name="description" content="Connect any two events, entities, or cover-ups from the conspiracy archive. Every file connects to others. The chain is the product.">
<link rel="stylesheet" href="/styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="connect-page">

<header class="site-header">
  <a href="/today/" class="todays-file-link" aria-label="Today's daily entry">Today's File &rarr;</a>
  <div class="classified-stamp">DECLASSIFIED</div>
  <h1 class="site-title">This Day in Conspiracies</h1>
  <p class="site-subtitle">Unexplained events · UFO sightings · Political cover-ups · Cryptid encounters</p>
  <div class="date-banner">
    <span class="date-label">FILE DATE:</span>
    <span id="current-date"></span>
  </div>
  <p class="archive-updated" id="archive-updated">ARCHIVE LAST UPDATED &mdash;</p>
</header>

<main>
  <section class="connect-tool">
    <h2 class="section-heading">Connect the Files</h2>

    <div class="connect-form">
      <label class="connect-label" for="from-input">FROM</label>
      <div class="connect-field">
        <input
          id="from-input"
          type="text"
          class="connect-input"
          autocomplete="off"
          spellcheck="false"
          placeholder="JFK ASSASSINATION"
          disabled
        >
        <div id="from-dropdown" class="ac-dropdown" aria-hidden="true" role="listbox"></div>
      </div>

      <label class="connect-label" for="to-input">TO</label>
      <div class="connect-field">
        <input
          id="to-input"
          type="text"
          class="connect-input"
          autocomplete="off"
          spellcheck="false"
          placeholder="MKULTRA"
          disabled
        >
        <div id="to-dropdown" class="ac-dropdown" aria-hidden="true" role="listbox"></div>
      </div>

      <button id="find-button" class="connect-cta" type="button" disabled>
        <span class="cta-label">INITIALIZING...</span>
      </button>
    </div>

    <div id="result-region" class="result-region">
      <div class="empty-state">
        <p>TYPE TWO SUBJECTS.</p>
        <p>WE WILL ASSEMBLE THE FILE.</p>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <p>&copy; <span id="year"></span> This Day in Conspiracies &middot; The files are never fully closed.</p>
</footer>

<script type="module" src="/js/connect.js"></script>
<script>
  (function () {
    var d = new Date();
    var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('current-date').textContent = (months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear()).toUpperCase();
    document.getElementById('year').textContent = d.getFullYear();
  })();
</script>
</body>
</html>
